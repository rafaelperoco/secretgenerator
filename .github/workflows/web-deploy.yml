name: web-deploy

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "internal/**"
      - "pkg/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/web-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Go (for TinyGo build of WASM)
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.2"
          cache-dependency-path: go.sum

      - name: Install TinyGo
        env:
          TINYGO_VERSION: "0.41.1"
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/tinygo-org/tinygo/releases/download/v${TINYGO_VERSION}/tinygo${TINYGO_VERSION}.linux-amd64.tar.gz" \
            -o /tmp/tinygo.tgz
          sudo tar -xzf /tmp/tinygo.tgz -C /usr/local/
          echo "/usr/local/tinygo/bin" >> "$GITHUB_PATH"
          /usr/local/tinygo/bin/tinygo version

      - name: Install dependencies
        run: npm ci

      - name: Build (WASM + Astro)
        run: npm run build

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: web/dist

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
